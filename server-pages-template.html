<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">伺服器詳細資訊 - 官方網站</title>

    <!-- 讀取外部樣式表 -->
    <link rel="stylesheet" href="css/server-page.css">
</head>

<body>

    <!-- 頂部導覽列 -->
    <header>
        <div class="header-container">
            <h1><a href="index.html" style="text-decoration: none; font-weight: 700;">伺服器公告</a></h1>
            <nav>
                <a href="index.html">首頁</a>
                <a href="menu.html">伺服器</a>
                <a href="news.html">遊戲新聞</a>
            </nav>
        </div>
    </header>

    <!-- ==================== 1. 頂部固定橫幅專案資訊 ==================== -->
    <div class="project-header">
        <div class="project-header-container">
            <div class="project-meta-left">
                <!-- 智慧圖標：由 JS 控制更換背景圖 -->
                <div id="server-icon" class="project-icon"></div>
                <div class="project-title-block">
                    <h2 id="server-display-name">載入中...</h2>
                    <p id="server-subtitle" class="project-subtitle"></p>
                </div>
            </div>
            <div class="project-meta-right">
                <button id="ip-btn" class="btn-download" onclick="copyServerIP()">
                    <svg id="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round"
                        style="width: 18px; height: 18px; margin-right: 8px;">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="btn-text">複製 IP</span>
                </button>
            </div>
        </div>

        <!-- ==================== 2. Modrinth 頁籤導覽列 ==================== -->
        <div class="project-tabs-nav">
            <button class="tab-btn active" onclick="switchTab('description')">描述</button>
            <button class="tab-btn" onclick="switchTab('gallery')">圖庫</button>
            <button class="tab-btn" onclick="switchTab('changelog')">更新日誌</button>
        </div>
    </div>

    <!-- ==================== 3. 雙欄佈局主要核心 ==================== -->
    <div class="main-layout">

        <!-- 左欄：動態主內容 -->
        <div class="tab-content-panel">

            <!-- 分頁一：描述 -->
            <div id="tab-description" class="page-section active">
                <div id="video-container" class="video-wrapper">
                    <!-- 由 JS 動態生成影片外殼，防止沒影片時留白 -->
                </div>
                <div class="description-text">
                    <h3 id="desc-title"></h3>
                    <div id="desc-paragraphs"></div>
                </div>
            </div>

            <!-- 分頁二：圖庫 -->
            <div id="tab-gallery" class="page-section">
                <div id="gallery-render-grid" class="gallery-grid">
                    <!-- 由 JS 自動跑迴圈生成圖片 -->
                </div>
            </div>

            <!-- 分頁三：更新日誌 -->
            <div id="tab-changelog" class="page-section">
                <div id="changelog-render-timeline" class="changelog-timeline">
                    <!-- 由 JS 自動跑迴圈生成日誌節點 -->
                </div>
            </div>
        </div>

        <!-- 右欄：固定邊欄 -->
        <div class="sidebar-panel">
            <div class="sidebar-card">
                <h3>相容性</h3>
                <p id="sb-game-type" style="margin: 0 0 10px 0; font-size: 0.95rem; font-weight:600;"></p>
                <div>
                    <span id="sb-version" class="tag-pill"></span>
                </div>
            </div>

            <div id="sidebar-notice-card" class="sidebar-card">
                <h3>注意事項</h3>
                <div class="notice-box">
                    <strong id="sb-notice"></strong>
                </div>
            </div>

            <div class="sidebar-card" style="font-size: 0.95rem;">
                <h3>詳細資訊</h3>
                <div class="info-list">
                    <p id="info-client"></p>
                    <p id="info-customer"></p>
                    <p id="info-host"></p>
                    <p id="info-creator"></p>
                    <p id="info-created-at"></p>
                </div>
            </div>
        </div>

    </div>

    <!-- ==================== 4. 圖片放大燈箱效果專區 ==================== -->
    <div id="image-lightbox" class="lightbox" onclick="handleLightboxClick(event)">
        <img class="lightbox-content" id="lightbox-img" alt="放大圖片">
        <div class="lightbox-toolbar" id="lightbox-toolbar" onclick="event.stopPropagation()">
            <button class="toolbar-btn" onclick="closeLightbox()" title="關閉 (ESC)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <button class="toolbar-btn" onclick="copyImageLink()" title="複製圖片分享連結">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
            </button>
            <button class="toolbar-btn" onclick="openInNewTab()" title="在新分頁開啟原始大圖">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
            </button>
            <button class="toolbar-btn" onclick="prevImage()" title="上一張 (←)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <button class="toolbar-btn" onclick="nextImage()" title="下一張 (→)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
        <div class="lightbox-meta-block" id="lightbox-meta">
            <h3 class="lightbox-title" id="lightbox-title">圖片標題</h3>
            <p class="lightbox-sub" id="lightbox-sub">圖片詳細資訊</p>
        </div>
    </div>

    <!-- 提示小彈窗 (Toast) -->
    <div id="lightbox-toast" class="lightbox-toast">已複製圖片連結！</div>

    <!-- 智慧核心指令腳本 -->
    <script>
        let currentImgIndex = 0;
        let galleryImages = [];
        let globalServerIP = ""; // 儲存動態 IP 全域變數

        // 核心運作：動態載入 JSON
        document.addEventListener("DOMContentLoaded", () => {
            // 1. 自動從網址分析要抓哪一頁，例如：?server=aether，預設去讀 aether
            const urlParams = new URLSearchParams(window.location.search);
            const serverKey = urlParams.get('server') || 'aether';

            // 2. 利用 Fetch API 去抓 data/ 資料夾裡的對應 json 檔案
            fetch(`data/${serverKey}.json`)
                .then(response => {
                    if (!response.ok) throw new Error('找不到該伺服器的設定檔！');
                    return response.json();
                })
                .then(data => {
                    renderServerPage(data);
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById('server-display-name').textContent = "找不到頁面";
                    document.getElementById('server-subtitle').textContent = "請確認網址的參數是否正確。";
                });
        });

        // 渲染畫面的大工程
        function renderServerPage(data) {
            // 頂部與全域變數
            document.title = `${data.serverName} 詳細資訊 - 官方網站`;
            document.getElementById('server-display-name').textContent = data.serverName;
            document.getElementById('server-subtitle').textContent = data.subtitle;
            globalServerIP = data.ipAddress; // 綁定複製按鈕的 IP

            // 設定圖標
            const iconUrl = `images/server-${window.location.search.includes('main') ? 'main' : 'aether'}/icon.png`; // 防呆預設路徑規則
            document.getElementById('server-icon').style.backgroundImage = `url('images/server-${window.location.search.get?.('server') || 'aether'}/icon.png')`;
            document.getElementById('server-icon').style.backgroundSize = "cover";

            // 分頁一：描述與影片
            const videoContainer = document.getElementById('video-container');
            if (data.description.youtubeEmbedUrl) {
                videoContainer.innerHTML = `<iframe width="560" height="315" src="${data.description.youtubeEmbedUrl}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
            } else {
                videoContainer.style.display = "none";
            }
            document.getElementById('desc-title').textContent = data.description.title;
            const pContainer = document.getElementById('desc-paragraphs');
            data.description.paragraphs.forEach(text => {
                pContainer.innerHTML += `<p>${text}</p>`;
            });

            // 分頁二：動態渲染圖庫 Grid
            const galleryGrid = document.getElementById('gallery-render-grid');
            if (data.gallery && data.gallery.length > 0) {
                data.gallery.forEach((img, idx) => {
                    galleryImages.push({ src: img.src, title: img.alt, subtitle: img.meta });
                    galleryGrid.innerHTML += `
                        <div class="gallery-card">
                            <img src="${img.src}" class="gallery-img" alt="${img.alt}" onclick="openLightbox(${idx})">
                            <div class="gallery-meta">${img.meta}</div>
                        </div>
                    `;
                });
            } else {
                galleryGrid.innerHTML = `<p style="color: var(--color-muted); padding: 20px;">目前尚無圖片。</p>`;
            }

            // 分頁三：動態渲染更新日誌 Timeline
            const changelogTimeline = document.getElementById('changelog-render-timeline');
            if (data.changelog && data.changelog.length > 0) {
                data.changelog.forEach(log => {
                    let detailHTML = "";
                    if (log.details && log.details.length > 0) {
                        detailHTML = `
                            <div class="log-body">
                                <ul>${log.details.map(item => `<li>${item}</li>`).join('')}</ul>
                            </div>`;
                    } else {
                        detailHTML = `<div class="log-body"></div>`;
                    }
                    changelogTimeline.innerHTML += `
                        <div class="log-node">
                            <div class="log-header">
                                <h4 class="log-title">${log.title}</h4>
                                <span class="log-date">${log.date}</span>
                            </div>
                            ${detailHTML}
                        </div>
                    `;
                });
            }

            // 右側資訊欄欄位
            document.getElementById('sb-game-type').textContent = data.sidebar.gameType;
            document.getElementById('sb-version').textContent = data.sidebar.version;
            
            // 注意事項卡片防呆控制 (若無注意事項就完全隱藏卡片)
            if (data.sidebar.notice) {
                document.getElementById('sb-notice').textContent = data.sidebar.notice;
            } else {
                document.getElementById('sidebar-notice-card').style.display = "none";
            }

            document.getElementById('info-client').textContent = `用戶端：${data.sidebar.details.clientType}`;
            document.getElementById('info-customer').textContent = `客戶端：${data.sidebar.details.customerType}`;
            document.getElementById('info-host').textContent = `託管機構：${data.sidebar.details.host}`;
            document.getElementById('info-creator').textContent = `建立者：${data.sidebar.details.creator}`;
            document.getElementById('info-created-at').textContent = `建立時間：${data.sidebar.details.createdAt}`;
        }

        // 頁籤無縫切換機制
        function switchTab(tabId) {
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(section => section.classList.remove('active'));

            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            document.getElementById('tab-' + tabId).classList.add('active');

            if (window.event && window.event.currentTarget) {
                window.event.currentTarget.classList.add('active');
            }
        }

        // 流暢複製 IP
        function copyServerIP() {
            if (!globalServerIP) return;
            navigator.clipboard.writeText(globalServerIP);

            const ipBtn = document.getElementById('ip-btn');
            const btnText = document.getElementById('btn-text');
            const copyIcon = document.getElementById('copy-icon');

            if (btnText) btnText.textContent = '已複製 IP！';
            if (copyIcon) copyIcon.style.display = 'none';
            ipBtn.classList.add('copied');

            setTimeout(() => {
                if (btnText) btnText.textContent = '複製 IP';
                if (copyIcon) copyIcon.style.display = 'inline-block';
                ipBtn.classList.remove('copied');
            }, 1500);
        }

        // ==========================================================================
        // 燈箱控制系統 (完美相容動態資料版)
        // ==========================================================================
        function openLightbox(index) {
            currentImgIndex = index;
            const lightbox = document.getElementById('image-lightbox');
            updateLightboxContent();
            lightbox.style.display = "flex";
            document.body.style.overflow = "hidden";
            document.addEventListener('keydown', handleKeyDown);
        }

        function updateLightboxContent() {
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxTitle = document.getElementById('lightbox-title');
            const lightboxSub = document.getElementById('lightbox-sub');
            const metaBlock = document.getElementById('lightbox-meta');
            const currentData = galleryImages[currentImgIndex];

            if (currentData) {
                lightboxImg.src = currentData.src;
                lightboxTitle.textContent = currentData.title;
                lightboxSub.textContent = currentData.subtitle;

                if (!currentData.title && !currentData.subtitle) {
                    metaBlock.classList.add('hide-meta');
                } else {
                    metaBlock.classList.remove('hide-meta');
                }
            }
        }

        function handleLightboxClick(event) {
            if (event.target.id === "image-lightbox") {
                closeLightbox();
            }
        }

        function closeLightbox() {
            const lightbox = document.getElementById('image-lightbox');
            lightbox.style.display = "none";
            document.body.style.overflow = "auto";
            document.removeEventListener('keydown', handleKeyDown);
        }

        function nextImage() {
            if (galleryImages.length === 0) return;
            currentImgIndex = (currentImgIndex + 1) % galleryImages.length;
            updateLightboxContent();
        }

        function prevImage() {
            if (galleryImages.length === 0) return;
            currentImgIndex = (currentImgIndex - 1 + galleryImages.length) % galleryImages.length;
            updateLightboxContent();
        }

        function openInNewTab() {
            const currentData = galleryImages[currentImgIndex];
            if (currentData) {
                window.open(currentData.src, '_blank');
            }
        }

        function copyImageLink() {
            const currentData = galleryImages[currentImgIndex];
            if (currentData) {
                const absoluteUrl = new URL(currentData.src, window.location.href).href;
                navigator.clipboard.writeText(absoluteUrl).then(() => {
                    const toast = document.getElementById('lightbox-toast');
                    toast.classList.add('show');
                    setTimeout(() => {
                        toast.classList.remove('show');
                    }, 2000);
                });
            }
        }

        function handleKeyDown(e) {
            if (e.key === "ArrowRight") {
                nextImage();
            } else if (e.key === "ArrowLeft") {
                prevImage();
            } else if (e.key === "Escape") {
                closeLightbox();
            }
        }
    </script>

    <!-- 頁尾宣告 -->
    <footer style="background-color: #16171a; border-top: 1px solid #2c2e33; padding: 40px 20px; color: #a3a7af; margin-top: 50px;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <div>
                <div style="font-size: 1.2rem; font-weight: bold; color: #fff; margin-bottom: 6px;">伺服器公告專案</div>
                <p style="margin: 0; font-size: 0.95rem;">本站為開源專案，歡迎至 GitHub 參與貢獻。</p>
            </div>
            <div style="display: flex; gap: 20px;">
                <a href="https://github.com/KevinChensinlong/KevinChensinlong.github.io" target="_blank"
                    style="color: #a3a7af; text-decoration: none; transition: 0.2s;"
                    onmouseover="this.style.textDecoration='underline'; this.style.color='#fff';"
                    onmouseout="this.style.textDecoration='none'; this.style.color='#a3a7af';">
                    GitHub 原始碼
                </a>
                <a href="#" style="color: #a3a7af; text-decoration: none; transition: 0.2s;"
                    onmouseover="this.style.textDecoration='underline'; this.style.color='#fff';"
                    onmouseout="this.style.textDecoration='none'; this.style.color='#a3a7af';">服務條款</a>
                <a href="#" style="color: #a3a7af; text-decoration: none; transition: 0.2s;"
                    onmouseover="this.style.textDecoration='underline'; this.style.color='#fff';"
                    onmouseout="this.style.textDecoration='none'; this.style.color='#a3a7af';">隱私政策</a>
            </div>
        </div>
        <div style="max-width: 1200px; margin: 20px auto 0 auto; padding-top: 20px; border-top: 1px solid #2c2e33; text-align: center; font-size: 0.85rem;">
            &copy; 2026 鄭世岡 ｜ 託管於 GitHub Pages ｜ Minecraft 為 Mojang AB 之商標
        </div>
    </footer>

</body>

</html>
